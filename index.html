<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Modals</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="modal" id="newProjectModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('newProjectModal')">&times;</span>
            <h2>New Project</h2>
            <form>
                <input type="text" placeholder="Project Name" required>
                <button type="button" onclick="closeModal('newProjectModal')">Cancel</button>
                <button type="submit">Add</button>
            </form>
        </div>
    </div>

    <div class="modal" id="addClientModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('addClientModal')">&times;</span>
            <h2>Add Client</h2>
            <form>
                <input type="text" placeholder="Client Name" required>
                <button type="button" onclick="closeModal('addClientModal')">Cancel</button>
                <button type="submit">Add</button>
            </form>
        </div>
    </div>

    <div class="modal" id="addMemberModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('addMemberModal')">&times;</span>
            <h2>Add Member</h2>
            <form>
                <input type="text" placeholder="Member Name" required>
                <button type="button" onclick="closeModal('addMemberModal')">Cancel</button>
                <button type="submit">Add</button>
            </form>
        </div>
    </div>

    <div class="modal" id="newTaskModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('newTaskModal')">&times;</span>
            <h2>New Task</h2>
            <form>
                <input type="text" placeholder="Task Name" required>
                <button type="button" onclick="closeModal('newTaskModal')">Cancel</button>
                <button type="submit">Add</button>
            </form>
        </div>
    </div>

    <div class="modal" id="generateReportModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('generateReportModal')">&times;</span>
            <h2>Generate Report</h2>
            <form>
                <input type="text" placeholder="Report Name" required>
                <button type="button" onclick="closeModal('generateReportModal')">Cancel</button>
                <button type="submit">Generate</button>
            </form>
        </div>
    </div>

    <script>
        function openModal(modalId) {
            document.getElementById(modalId).style.display = 'block';
        }
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }
    </script>
</body>
</html>
